<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streakr</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111118;
    --surface: #1a1a24;
    --card: #202030;
    --accent: #a78bfa;
    --accent2: #f472b6;
    --green: #34d399;
    --orange: #fb923c;
    --text: #f0eeff;
    --muted: #6b6b8a;
    --border: rgba(167,139,250,0.13);
  }

  body {
    background: var(--bg);
    font-family: -apple-system, 'Hiragino Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0;
  }

  .phone {
    width: 100%;
    max-width: 430px;
    background: var(--bg);
    overflow: hidden;
  }

  @media (min-width: 500px) {
    body { padding: 40px 16px; background: #05050a; }
    .phone {
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    }
  }

  /* ── Header ── */
  .header {
    padding: 52px 28px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(120deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    cursor: pointer;
  }

  /* ── Today strip ── */
  .today-strip {
    margin: 0 20px 24px;
    background: var(--card);
    border-radius: 20px;
    border: 1px solid var(--border);
    padding: 16px 20px;
  }
  .today-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .habits-row {
    display: flex;
    gap: 10px;
  }
  .habit-chip {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: background 0.2s;
    border: 1.5px solid transparent;
  }
  .habit-chip.done {
    border-color: rgba(167,139,250,0.25);
    background: rgba(167,139,250,0.06);
  }
  .habit-chip .icon { font-size: 20px; }
  .habit-chip .hname { font-size: 10px; font-weight: 600; color: var(--muted); }
  .habit-chip .hstreak {
    font-size: 13px;
    font-weight: 800;
    color: var(--text);
  }
  .habit-chip.done .hstreak { color: var(--accent); }
  .check-mark {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  .habit-chip.done .check-mark {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── Friends ── */
  .section {
    padding: 0 20px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 14px;
  }

  /* Story avatars */
  .friends-scroll {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .friends-scroll::-webkit-scrollbar { display: none; }
  .friend-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .friend-ring {
    padding: 2px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .friend-ring.inactive {
    background: var(--card);
    border: 1.5px solid var(--border);
    padding: 1.5px;
  }
  .friend-face {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    border: 2px solid var(--bg);
  }
  .friend-name { font-size: 11px; color: var(--muted); font-weight: 500; }
  .friend-streak {
    font-size: 10px;
    font-weight: 700;
    color: var(--orange);
  }
  .friend-streak.none { color: var(--muted); }

  /* Feed cards */
  .feed { padding: 0 20px 24px; display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--card);
    border-radius: 22px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 12px;
  }
  .c-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .c-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .c-time { font-size: 11px; color: var(--muted); margin-left: auto; }

  .card-habits { padding: 0 14px 12px; display: flex; flex-direction: column; gap: 6px; }
  .habit-line {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
  }
  .hl-left { display: flex; align-items: center; gap: 8px; }
  .hl-emoji { font-size: 16px; }
  .hl-name { font-size: 13px; font-weight: 600; }
  .pill {
    font-size: 11px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 99px;
    color: var(--orange);
    background: rgba(251,146,60,0.1);
  }
  .pill.purple { color: var(--accent); background: rgba(167,139,250,0.1); }
  .pill.green { color: var(--green); background: rgba(52,211,153,0.1); }

  .card-reactions {
    display: flex;
    gap: 6px;
    padding: 0 14px 12px;
  }
  .rxn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 99px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }
  .rxn:hover, .rxn.on {
    background: rgba(167,139,250,0.1);
    border-color: rgba(167,139,250,0.25);
    color: var(--accent);
  }

  /* ── Bottom nav ── */
  .nav {
    display: flex;
    justify-content: space-around;
    padding: 14px 20px 36px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    opacity: 0.35;
    transition: opacity 0.2s;
  }
  .nav-btn.on { opacity: 1; }
  .nav-btn .ni { font-size: 22px; }
  .nav-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--accent);
  }
</style>
</head>
<body>
<div class="phone">

  <div class="header">
    <div class="logo">streakr</div>
    <div class="avatar">🌙</div>
  </div>

  <!-- Today's habits -->
  <div class="today-strip">
    <div class="today-label">今日の習慣</div>
    <div class="habits-row">
      <div class="habit-chip done" onclick="this.classList.toggle('done')">
        <div class="check-mark">✓</div>
        <div class="icon">📖</div>
        <div class="hname">英語</div>
        <div class="hstreak">23日</div>
      </div>
      <div class="habit-chip done" onclick="this.classList.toggle('done')">
        <div class="check-mark">✓</div>
        <div class="icon">🏃</div>
        <div class="hname">ランニング</div>
        <div class="hstreak">7日</div>
      </div>
      <div class="habit-chip" onclick="this.classList.toggle('done')">
        <div class="check-mark"></div>
        <div class="icon">🧘</div>
        <div class="hname">瞑想</div>
        <div class="hstreak">3日</div>
      </div>
    </div>
  </div>

  <!-- Friends -->
  <div class="section">
    <div class="section-title">フレンド</div>
    <div class="friends-scroll">
      <div class="friend-item">
        <div class="friend-ring"><div class="friend-face">🐻</div></div>
        <div class="friend-name">神戸</div>
        <div class="friend-streak">🔥12</div>
      </div>
      <div class="friend-item">
        <div class="friend-ring"><div class="friend-face">🦊</div></div>
        <div class="friend-name">りな</div>
        <div class="friend-streak">🔥8</div>
      </div>
      <div class="friend-item">
        <div class="friend-ring"><div class="friend-face">🐼</div></div>
        <div class="friend-name">たいち</div>
        <div class="friend-streak">🔥31</div>
      </div>
      <div class="friend-item">
        <div class="friend-ring inactive"><div class="friend-face">🐨</div></div>
        <div class="friend-name">さな</div>
        <div class="friend-streak none">—</div>
      </div>
      <div class="friend-item">
        <div class="friend-ring"><div class="friend-face">🦋</div></div>
        <div class="friend-name">まい</div>
        <div class="friend-streak">🔥5</div>
      </div>
    </div>
  </div>

  <!-- Feed -->
  <div style="padding: 0 20px; margin-bottom: 10px;">
    <div class="section-title">フィード</div>
  </div>
  <div class="feed">

    <div class="card">
      <div class="card-top">
        <div class="c-avatar">🐻</div>
        <div class="c-name">神戸 慶</div>
        <div class="c-time">22:05</div>
      </div>
      <div class="card-habits">
        <div class="habit-line">
          <div class="hl-left">
            <div class="hl-emoji">📖</div>
            <div class="hl-name">英語学習</div>
          </div>
          <div class="pill">🔥 12日</div>
        </div>
        <div class="habit-line">
          <div class="hl-left">
            <div class="hl-emoji">💪</div>
            <div class="hl-name">筋トレ</div>
          </div>
          <div class="pill green">✓ 5日</div>
        </div>
      </div>
      <div class="card-reactions">
        <div class="rxn on" onclick="this.classList.toggle('on')">🔥 すごい</div>
        <div class="rxn" onclick="this.classList.toggle('on')">👏 えらい</div>
        <div class="rxn" onclick="this.classList.toggle('on')">💬</div>
      </div>
    </div>

    <div class="card">
      <div class="card-top">
        <div class="c-avatar">🐼</div>
        <div class="c-name">たいち</div>
        <div class="c-time">21:18</div>
      </div>
      <div class="card-habits">
        <div class="habit-line">
          <div class="hl-left">
            <div class="hl-emoji">🎸</div>
            <div class="hl-name">ギター練習</div>
          </div>
          <div class="pill purple">🔥 31日</div>
        </div>
      </div>
      <div class="card-reactions">
        <div class="rxn" onclick="this.classList.toggle('on')">🎸 かっこいい</div>
        <div class="rxn" onclick="this.classList.toggle('on')">🔥 すごい</div>
        <div class="rxn" onclick="this.classList.toggle('on')">💬</div>
      </div>
    </div>

  </div>

  <!-- Nav -->
  <div class="nav">
    <div class="nav-btn on">
      <div class="ni">🏠</div>
      <div class="nav-dot"></div>
    </div>
    <div class="nav-btn" onclick="document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">
      <div class="ni">👥</div>
    </div>
    <div class="nav-btn" onclick="document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">
      <div class="ni">📊</div>
    </div>
    <div class="nav-btn" onclick="document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">
      <div class="ni">⚙️</div>
    </div>
  </div>

</div>
</body>
</html>
